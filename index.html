<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main class="main">
        <nav id="navi"></nav>

        <section id="allelem">

            <section class="todo elem" id="0">
                <img src="/img/todo.jpg" alt="">
                <h2>To-Do List</h2>
            </section>

            <section class="daily elem " id="1">
                <img src="https://images.unsplash.com/photo-1691318110143-ebd82d266740?q=80&w=636&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Daily Planner</h2>
            </section>

            <section class="moti elem" id="2">
                <img src="https://images.unsplash.com/photo-1770110000218-e9376e581258?w=600&auto=format&fit=crop&q=60"
                    alt="">
                <h2>MotiVation</h2>
            </section>

            <section class="pomo elem" id="3">
                <img src="https://images.unsplash.com/photo-1647184349954-f2aea3606d64?w=600&auto=format&fit=crop&q=60"
                    alt="">
                <h2>Pomodoro</h2>
            </section>

            <section class="goal elem" id="4">
                <img src="https://images.unsplash.com/photo-1688325599598-401400d2cd88?w=600&auto=format&fit=crop&q=60"
                    alt="">
                <h2>Goals</h2>
            </section>

        </section>

        <section class="fullelem todo-page">
            <h1 class="txt">Personlized Task List</h1>
            <div class="taskcontainer">
                <div class="taskadd">
                    <form>
                        <input type="text" placeholder="Enter Task">
                    <textarea name="txtarea" id="txt0" placeholder="Enter Description of Your Task"></textarea>
                    <div id="tick">
                        <input type="checkbox" id="check">
                        <label for="check">Mark as Important</label>
                    </div>
                    <button><h2>Submit</h2></button>
                    </form>
                </div>
                <div class="tasklist">
                </div>
            </div>
            <button class="clse">
                <h3>Close</h3>
            </button>
        </section>

        <section class="fullelem dailyplanner-page">
            <h1>Plan Your Day to be More Productive</h1>
            <div class="day-planner">
            </div>
            <button class="clse">
                <h3>Close</h3>
            </button>
        </section>

        <section class="fullelem motivation-page">
            <h1>Today MotiVation Quote</h1>
            <div class="mot-Contain">
                <div class="motiv">
            
            </div>   
            </div>
            </div>
            

            <button class="clse">
                <h3>Close</h3>
            </button>
        </section>

        <section class="fullelem pomodoro-page">
            <h1>Pomodoro</h1>
            <button class="clse">
                <h3>Close</h3>
            </button>
        </section>

        <section class="fullelem goals-page">
            <h1>Goals</h1>
            <button class="clse">
                <h3>Close</h3>
            </button>
        </section>

    </main>
    <span class="marked">
        <h6>----Developed By----</h6>
        <h6>SAGAR BATHAM</h6>
    </span>
    <script src="script.js"></script>
</body>

</html>
